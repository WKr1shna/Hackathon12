<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Callback Calculator</title>

  <style>
  body {
    font-family: Arial, sans-serif;
    padding: 200px;
    margin-left: 300px;
    background-color: #f0f0f0;
  }

  .calculator {
    border: none;
    width: 250px;
    padding: 15px;
    border-radius: 20px;
    background-color: #1c1c1c;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #display {
    width: 230px;
    height: 60px;
    font-size: 30px;
    margin-bottom: 15px;
    background-color: #000;
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: right;
  }
  </style>
</head>

<body>
  <div class="calculator">
    <input id="display">
  </div>

  <script src="script.js"></script>
</body>
</html>
