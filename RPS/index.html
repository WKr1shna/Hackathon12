    <title>Document</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }
    .rps {
        margin-bottom: 20px;
    }
    .btn {
        color: black;
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    #result {
        margin-top: 20px;
        font-size: 18px;

    .b1{
        border-radius: 50%;

    }
    .b2{
        border-radius: 50%;
        width: 200px;
        height: 200px;
        background-size: contain;
        background-repeat: no-repeat;
        background-color: lightblue;
        background-image: url("https://imgs.search.brave.com/1anKBRDEZD53nr3XUJq4ZXQNiQbR_2q9I6wrU0CVS_o/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9jZG4u/cGl4YWJheS5jb20v/cGhvdG8vMjAyMC8w/OS8zMC8xNC8zNC9w/YXBlci01NjE1OTQ0/XzY0MC5wbmc")

<body>
    <div class="rps">
        <h1>Rock Paper Scissors</h1>
        <button class="btn b1" id="1"></button>
        <button class="btn b2" id="2"></button>
        <button class="btn b3" id="3"></button>
        <div id="result"></div>
    </div>
    <div class="score">
        <h2>Score</h2>
        <p id="player-score">Player: </p>
        <p id="computer-score">Computer: </p>
    </div>
